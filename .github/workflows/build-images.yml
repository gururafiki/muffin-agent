name: Build & push images

# Builds the three source-built Muffin images for ARM64 (Oracle A1 / aarch64) and pushes them to
# GHCR. Runs on a native arm64 runner (free for public repos) — no QEMU emulation.
#
# Consumed by the Oracle Swarm deploy (oracle-cloud-docker-swarm-setup):
#   ghcr.io/gururafiki/muffin:{api,openbb,ui}
#
# The UI uses the same-origin API proxy (NEXT_PUBLIC_API_URL=/api, baked in the Dockerfile);
# the real backend is set at runtime via LANGGRAPH_API_URL in the docker stack — so no build-time
# config / repo variable is needed here.
# After the first run, make the `muffin` GHCR package public so the VM can pull without a PAT.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "extras/**"
      - "langgraph.json"
      - "pyproject.toml"
      - "auth.py"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}/muffin
  PLATFORM: linux/arm64

jobs:
  build:
    runs-on: ubuntu-24.04-arm # native arm64, free for public repos
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- agent server: generate the Dockerfile from langgraph.json, then build ---
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Generate LangGraph Dockerfile
        run: |
          pip install --upgrade langgraph-cli
          langgraph dockerfile Dockerfile.langgraph

      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.langgraph
          platforms: ${{ env.PLATFORM }}
          push: true
          tags: |
            ${{ env.REGISTRY }}:api
            ${{ env.REGISTRY }}:api-${{ github.sha }}

      - name: Build & push openbb
        uses: docker/build-push-action@v6
        with:
          context: ./extras/openbb
          platforms: ${{ env.PLATFORM }}
          push: true
          tags: |
            ${{ env.REGISTRY }}:openbb
            ${{ env.REGISTRY }}:openbb-${{ github.sha }}

      - name: Build & push ui
        uses: docker/build-push-action@v6
        with:
          context: ./extras/agent-chat-ui
          platforms: ${{ env.PLATFORM }}
          push: true
          tags: |
            ${{ env.REGISTRY }}:ui
            ${{ env.REGISTRY }}:ui-${{ github.sha }}
