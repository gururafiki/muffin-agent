name: Build & push nuq-postgres (arm64)

# Firecrawl's `nuq-postgres` image (Postgres + pg_cron + the NUQ schema) is published upstream as
# amd64-only, so it can't schedule on the Oracle ARM (aarch64) node. This rebuilds it for arm64
# from Firecrawl's source and pushes it to GHCR for the Swarm:
#   ghcr.io/<owner>/muffin:nuq-postgres
#
# Runs on demand (workflow_dispatch) and once whenever this workflow file changes (e.g. on merge),
# so it does NOT rebuild on every push — nuq-postgres rarely changes.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-nuq-postgres.yml"

concurrency:
  group: build-nuq-postgres
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04-arm # native arm64, free for public repos
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Sparse-checkout only the nuq-postgres build context from Firecrawl (public repo).
      - name: Checkout Firecrawl nuq-postgres source
        uses: actions/checkout@v4
        with:
          repository: firecrawl/firecrawl
          sparse-checkout: apps/nuq-postgres
          sparse-checkout-cone-mode: false

      - name: Build & push nuq-postgres
        uses: docker/build-push-action@v6
        with:
          context: ./apps/nuq-postgres
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/muffin:nuq-postgres
