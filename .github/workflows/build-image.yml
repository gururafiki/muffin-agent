name: Build & push agent image

# Builds the Muffin agent (LangGraph standalone server) image for ARM64 and pushes to GHCR:
#   ghcr.io/<owner>/muffin-agent:latest
# Deployed by the `muffin-deployment` repo as the `langgraph-api` service. (Coexists with the legacy
# build-images.yml during the multi-repo migration; that one is removed once the new deploy is verified.)
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "skills/**"
      - "langgraph.json"
      - "pyproject.toml"
      - "auth.py"
      - ".github/workflows/build-image.yml"
  workflow_dispatch:

concurrency:
  group: build-agent-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04-arm # native arm64, free for public repos
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Generate LangGraph Dockerfile
        run: |
          pip install --upgrade langgraph-cli
          langgraph dockerfile Dockerfile.langgraph
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.langgraph
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/muffin-agent:latest
            ghcr.io/${{ github.repository_owner }}/muffin-agent:${{ github.sha }}
      # Auto-CD: tell muffin-deployment a fresh image is on GHCR so it redeploys the Swarm stack
      # (deploy.yml listens for repository_dispatch type=deploy). Needs a cross-repo PAT — the
      # built-in GITHUB_TOKEN can't dispatch to another repo.
      - name: Trigger deploy
        if: github.ref == 'refs/heads/main'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/muffin-deployment
          event-type: deploy
          client-payload: '{"repo": "${{ github.repository }}", "sha": "${{ github.sha }}"}'
