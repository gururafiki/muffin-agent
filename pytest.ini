[pytest]
# Pytest configuration for Muffin Agent

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Minimum version
minversion = 8.0

# Command line options
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test outcomes
    -ra
    # Strict markers (must be defined)
    --strict-markers
    # Coverage options (when --cov is used)
    --cov-report=term-missing
    --cov-report=html
    --cov-branch

# Custom markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for complete workflows
    live: Tests that hit live external APIs (skipped by default)
    slow: Slow running tests

# Ignore patterns
norecursedirs = .git .venv __pycache__ *.egg-info archive scripts

# Coverage settings
[coverage:run]
source = src/muffin_agent
omit =
    */tests/*
    */__pycache__/*
    */archive/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Exclude lines from coverage
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
