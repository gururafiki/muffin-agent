configs:
  opensandbox-config:
    file: extras/opensandbox/config.toml

volumes:
  langgraph-data:
    driver: local

services:
  opensandbox-server:
    image: opensandbox/server:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Mount Docker socket so opensandbox can spin up sandbox containers
      - /var/run/docker.sock:/var/run/docker.sock
    configs:
      - source: opensandbox-config
        target: /etc/opensandbox/config.toml
    environment:
      # Set OPENSANDBOX_API_KEY in .env to enable authentication
      SANDBOX_API_KEY: ${OPENSANDBOX_API_KEY:-}
      SANDBOX_CONFIG_PATH: /etc/opensandbox/config.toml
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - muffin-net

  openbb-mcp:
    build:
      context: extras/openbb
    restart: unless-stopped
    env_file:
      - extras/openbb/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8001),2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - muffin-net

  langgraph-redis:
    image: redis:6
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 1s
      retries: 5
    networks:
      - muffin-net

  langgraph-postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - langgraph-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postgres
      start_period: 10s
      timeout: 1s
      retries: 5
      interval: 5s
    networks:
      - muffin-net

  langgraph-api:
    image: ${IMAGE_NAME:-muffin-agent:latest}
    restart: unless-stopped
    ports:
      - "8123:8000"
    depends_on:
      openbb-mcp:
        condition: service_healthy
      langgraph-redis:
        condition: service_healthy
      langgraph-postgres:
        condition: service_healthy
      opensandbox-server:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_URI: redis://langgraph-redis:6379
      DATABASE_URI: postgres://postgres:postgres@langgraph-postgres:5432/postgres?sslmode=disable
      OPENBB_MCP_URL: http://openbb-mcp:8001/mcp
      OPENSANDBOX_URL: opensandbox-server:8080
    networks:
      - muffin-net

  agent-chat-ui:
    build:
      context: extras/agent-chat-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - langgraph-api
    networks:
      - muffin-net


networks:
  muffin-net:
    driver: bridge