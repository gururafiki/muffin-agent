volumes:
  langgraph-data:
    driver: local

services:
  # Restricts Docker socket access to container lifecycle operations only.
  # langgraph-api uses this proxy (via DOCKER_HOST) to spawn isolated sandbox
  # containers without getting unrestricted root access to the host daemon.
  docker-socket-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    environment:
      CONTAINERS: 1  # /containers/* — create, start, stop, exec, cp
      EXEC: 1        # /exec/* — exec start/inspect
      POST: 1        # allow POST method (blocked by default when resources are scoped)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  openbb-mcp:
    build:
      context: extras/openbb
    restart: unless-stopped
    env_file:
      - extras/openbb/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8001),2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  langgraph-redis:
    image: redis:6
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 1s
      retries: 5

  langgraph-postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - langgraph-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postgres
      start_period: 10s
      timeout: 1s
      retries: 5
      interval: 5s

  langgraph-api:
    image: ${IMAGE_NAME:-muffin-agent:latest}
    restart: unless-stopped
    ports:
      - "8123:8000"
    depends_on:
      openbb-mcp:
        condition: service_healthy
      langgraph-redis:
        condition: service_healthy
      langgraph-postgres:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    env_file:
      - .env
    environment:
      REDIS_URI: redis://langgraph-redis:6379
      DATABASE_URI: postgres://postgres:postgres@langgraph-postgres:5432/postgres?sslmode=disable
      OPENBB_MCP_URL: http://openbb-mcp:8001/mcp
      # Route Docker CLI calls through the restricted socket proxy instead of
      # the raw host socket. Sandbox containers are spawned as host siblings
      # with --network=none --cap-drop=ALL, keeping the agent env isolated.
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      SANDBOX_BACKEND: docker

  agent-chat-ui:
    build:
      context: extras/agent-chat-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - langgraph-api
